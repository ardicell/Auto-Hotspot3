name: Build APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-20.04
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '8'
      - name: Build with Gradle
        run: |
          # 1. Buat struktur direktori
          mkdir -p app/src/main/java/com/autohotspot
          mkdir -p app/src/main/res/values
          mkdir -p gradle/wrapper
          
          # 2. Gradle wrapper 4.6
          echo "distributionBase=GRADLE_USER_HOME" > gradle/wrapper/gradle-wrapper.properties
          echo "distributionPath=wrapper/dists" >> gradle/wrapper/gradle-wrapper.properties
          echo "distributionUrl=https\://services.gradle.org/distributions/gradle-4.6-bin.zip" >> gradle/wrapper/gradle-wrapper.properties
          echo "zipStoreBase=GRADLE_USER_HOME" >> gradle/wrapper/gradle-wrapper.properties
          echo "zipStorePath=wrapper/dists" >> gradle/wrapper/gradle-wrapper.properties
          curl -s -L -o gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/gradle/gradle/v4.6.0/gradle/wrapper/gradle-wrapper.jar
          
          # 3. gradlew
          cat > gradlew << 'GRADLEW'
          #!/bin/bash
          exec java -cp gradle/wrapper/gradle-wrapper.jar org.gradle.wrapper.GradleWrapperMain "$@"
          GRADLEW
          chmod +x gradlew
          
          # 4. AndroidManifest.xml
          cat > app/src/main/AndroidManifest.xml << 'MANIFEST'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.autohotspot">
              <uses-permission android:name="android.permission.ACCESS_WIFI_STATE"/>
              <uses-permission android:name="android.permission.CHANGE_WIFI_STATE"/>
              <uses-permission android:name="android.permission.WRITE_SETTINGS"/>
              <uses-permission android:name="android.permission.RECEIVE_BOOT_COMPLETED"/>
              <application
                  android:allowBackup="true"
                  android:icon="@android:drawable/ic_dialog_info"
                  android:label="Auto Hotspot"
                  android:theme="@android:style/Theme.DeviceDefault.NoActionBar">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
                  <receiver android:name=".BootReceiver" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.BOOT_COMPLETED"/>
                      </intent-filter>
                  </receiver>
              </application>
          </manifest>
          MANIFEST
          
          # 5. MainActivity.java
          cat > app/src/main/java/com/autohotspot/MainActivity.java << 'JAVA1'
          package com.autohotspot;
          import android.app.Activity;
          import android.os.Bundle;
          import android.provider.Settings;
          import android.widget.Toast;
          public class MainActivity extends Activity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  if (!Settings.System.canWrite(this)) {
                      Toast.makeText(this, "Izin WRITE_SETTINGS diperlukan. Berikan secara manual di Pengaturan Aplikasi.", Toast.LENGTH_LONG).show();
                  } else {
                      Toast.makeText(this, "Auto Hotspot 'J2 Prime' tanpa password aktif saat booting.", Toast.LENGTH_SHORT).show();
                  }
                  finish();
              }
          }
          JAVA1
          
          # 6. BootReceiver.java
          cat > app/src/main/java/com/autohotspot/BootReceiver.java << 'JAVA2'
          package com.autohotspot;
          import android.content.BroadcastReceiver;
          import android.content.Context;
          import android.content.Intent;
          public class BootReceiver extends BroadcastReceiver {
              @Override
              public void onReceive(Context context, Intent intent) {
                  if (Intent.ACTION_BOOT_COMPLETED.equals(intent.getAction())) {
                      HotspotHelper.turnOnHotspot(context);
                  }
              }
          }
          JAVA2
          
          # 7. HotspotHelper.java
          cat > app/src/main/java/com/autohotspot/HotspotHelper.java << 'JAVA3'
          package com.autohotspot;
          import android.content.Context;
          import android.net.wifi.WifiConfiguration;
          import android.net.wifi.WifiManager;
          import android.util.Log;
          import java.lang.reflect.Method;
          public class HotspotHelper {
              public static void turnOnHotspot(Context context) {
                  try {
                      WifiManager wifiManager = (WifiManager) context.getSystemService(Context.WIFI_SERVICE);
                      if (wifiManager.isWifiEnabled()) {
                          wifiManager.setWifiEnabled(false);
                          Thread.sleep(1000);
                      }
                      WifiConfiguration netConfig = new WifiConfiguration();
                      netConfig.SSID = "J2 Prime";
                      netConfig.allowedKeyManagement.set(WifiConfiguration.KeyMgmt.NONE);
                      Method method = wifiManager.getClass().getMethod("setWifiApEnabled", WifiConfiguration.class, boolean.class);
                      method.invoke(wifiManager, netConfig, true);
                      Log.d("HotspotHelper", "Hotspot 'J2 Prime' (open) turned on");
                  } catch (Exception e) {
                      Log.e("HotspotHelper", "Error: " + e.getMessage());
                  }
              }
          }
          JAVA3
          
          # 8. build.gradle (app level)
          cat > app/build.gradle << 'APPGRADLE'
          apply plugin: 'com.android.application'
          android {
              compileSdk 23
              buildToolsVersion "23.0.3"
              defaultConfig {
                  applicationId "com.autohotspot"
                  minSdk 23
                  targetSdk 23
                  versionCode 1
                  versionName "1.0"
              }
              buildTypes {
                  release {
                      minifyEnabled false
                  }
              }
          }
          dependencies {
              implementation 'com.android.support:appcompat-v7:23.4.0'
          }
          APPGRADLE
          
          # 9. build.gradle (root) - PASTIKAN TIDAK ADA KESALAHAN
          cat > build.gradle << 'ROOTGRADLE'
          buildscript {
              repositories {
                  google()
                  jcenter()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:3.0.1'
              }
          }
          allprojects {
              repositories {
                  google()
                  jcenter()
              }
          }
          ROOTGRADLE
          
          # 10. settings.gradle
          echo "include ':app'" > settings.gradle
          
          # 11. gradle.properties
          cat > gradle.properties << 'PROPS'
          org.gradle.jvmargs=-Xmx1536m
          android.useAndroidX=false
          android.enableJetifier=false
          PROPS
          
          # 12. resources
          echo '<?xml version="1.0" encoding="utf-8"?><resources><string name="app_name">Auto Hotspot</string></resources>' > app/src/main/res/values/strings.xml
          echo '<?xml version="1.0" encoding="utf-8"?><resources><color name="black">#000000</color></resources>' > app/src/main/res/values/colors.xml
          
          # 13. Build APK
          ./gradlew assembleRelease --no-daemon
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: auto-hotspot-j2prime
          path: app/build/outputs/apk/release/*.apk
