name: Build APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Create project files
        run: |
          mkdir -p app/src/main/java/com/autohotspot
          mkdir -p app/src/main/res/values
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.autohotspot">
              <uses-permission android:name="android.permission.ACCESS_WIFI_STATE"/>
              <uses-permission android:name="android.permission.CHANGE_WIFI_STATE"/>
              <uses-permission android:name="android.permission.WRITE_SETTINGS"/>
              <uses-permission android:name="android.permission.RECEIVE_BOOT_COMPLETED"/>
              <application
                  android:allowBackup="true"
                  android:icon="@android:drawable/ic_dialog_info"
                  android:label="Auto Hotspot"
                  android:theme="@android:style/Theme.DeviceDefault.NoActionBar">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
                  <receiver android:name=".BootReceiver" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.BOOT_COMPLETED"/>
                      </intent-filter>
                  </receiver>
              </application>
          </manifest>
          EOF
          cat > app/src/main/java/com/autohotspot/MainActivity.java << 'EOF'
          package com.autohotspot;
          import android.app.Activity;
          import android.os.Bundle;
          import android.provider.Settings;
          import android.widget.Toast;
          public class MainActivity extends Activity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  if (!Settings.System.canWrite(this)) {
                      Toast.makeText(this, "Izin WRITE_SETTINGS diperlukan. Berikan secara manual di Pengaturan Aplikasi.", Toast.LENGTH_LONG).show();
                  } else {
                      Toast.makeText(this, "Auto Hotspot 'J2 Prime' tanpa password aktif saat booting.", Toast.LENGTH_SHORT).show();
                  }
                  finish();
              }
          }
          EOF
          cat > app/src/main/java/com/autohotspot/BootReceiver.java << 'EOF'
          package com.autohotspot;
          import android.content.BroadcastReceiver;
          import android.content.Context;
          import android.content.Intent;
          public class BootReceiver extends BroadcastReceiver {
              @Override
              public void onReceive(Context context, Intent intent) {
                  if (Intent.ACTION_BOOT_COMPLETED.equals(intent.getAction())) {
                      HotspotHelper.turnOnHotspot(context);
                  }
              }
          }
          EOF
          cat > app/src/main/java/com/autohotspot/HotspotHelper.java << 'EOF'
          package com.autohotspot;
          import android.content.Context;
          import android.net.wifi.WifiConfiguration;
          import android.net.wifi.WifiManager;
          import android.util.Log;
          import java.lang.reflect.Method;
          public class HotspotHelper {
              public static void turnOnHotspot(Context context) {
                  try {
                      WifiManager wifiManager = (WifiManager) context.getSystemService(Context.WIFI_SERVICE);
                      if (wifiManager.isWifiEnabled()) {
                          wifiManager.setWifiEnabled(false);
                          Thread.sleep(1000);
                      }
                      WifiConfiguration netConfig = new WifiConfiguration();
                      netConfig.SSID = "J2 Prime";
                      netConfig.allowedKeyManagement.set(WifiConfiguration.KeyMgmt.NONE);
                      Method method = wifiManager.getClass().getMethod("setWifiApEnabled", WifiConfiguration.class, boolean.class);
                      method.invoke(wifiManager, netConfig, true);
                      Log.d("HotspotHelper", "Hotspot 'J2 Prime' (open) turned on");
                  } catch (Exception e) {
                      Log.e("HotspotHelper", "Error: " + e.getMessage());
                  }
              }
          }
          EOF
          cat > app/src/main/res/values/strings.xml << 'EOF'
          <resources><string name="app_name">Auto Hotspot</string></resources>
          EOF
          cat > app/src/main/res/values/colors.xml << 'EOF'
          <resources><color name="black">#000000</color></resources>
          EOF
          cat > app/build.gradle << 'EOF'
          plugins {
              id 'com.android.application'
          }
          android {
              compileSdk 34
              namespace 'com.autohotspot'
              defaultConfig {
                  applicationId "com.autohotspot"
                  minSdk 23
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
              buildTypes {
                  release {
                      minifyEnabled false
                  }
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
          }
          EOF
          cat > build.gradle << 'EOF'
          plugins {
              id 'com.android.application' version '8.1.0' apply false
          }
          EOF
          cat > settings.gradle << 'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "AutoHotspot"
          include ':app'
          EOF
          cat > gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx2048m
          android.useAndroidX=true
          EOF
      - name: Setup Gradle Wrapper
        run: |
          mkdir -p gradle/wrapper
          cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.0-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF
          curl -L -o gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/gradle/gradle/v8.0.0/gradle/wrapper/gradle-wrapper.jar
          cat > gradlew << 'EOF'
          #!/bin/sh
          exec java -cp gradle/wrapper/gradle-wrapper.jar org.gradle.wrapper.GradleWrapperMain "$@"
          EOF
          chmod +x gradlew
      - name: Build APK
        run: ./gradlew assembleRelease
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: auto-hotspot-j2prime
          path: app/build/outputs/apk/release/*.apk
