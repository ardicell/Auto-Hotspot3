name: Build APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '8'
      - name: Build with Gradle
        run: |
          # Download gradle wrapper 4.6
          mkdir -p gradle/wrapper
          echo "distributionUrl=https\://services.gradle.org/distributions/gradle-4.6-bin.zip" > gradle/wrapper/gradle-wrapper.properties
          curl -L -o gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/gradle/gradle/v4.6.0/gradle/wrapper/gradle-wrapper.jar
          cat > gradlew << 'EOF'
          #!/bin/bash
          exec java -cp gradle/wrapper/gradle-wrapper.jar org.gradle.wrapper.GradleWrapperMain "\$@"
          EOF
          chmod +x gradlew
          
          # Buat project minimal
          mkdir -p app/src/main/java/com/autohotspot
          mkdir -p app/src/main/res/values
          cat > app/build.gradle << 'EOF'
          apply plugin: 'com.android.application'
          android {
              compileSdk 23
              buildToolsVersion "23.0.3"
              defaultConfig { applicationId "com.autohotspot"; minSdk 23; targetSdk 23; versionCode 1; versionName "1" }
              buildTypes { release { minifyEnabled false } }
          }
          dependencies { implementation 'com.android.support:appcompat-v7:23.4.0' }
          EOF
          cat > build.gradle << 'EOF'
          buildscript { repositories { google(); jcenter() } dependencies { classpath 'com.android.tools.build:gradle:3.0.1' } }
          allprojects { repositories { google(); jcenter() } }
          EOF
          cat > settings.gradle << 'EOF'
          include ':app'
          EOF
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <manifest package="com.autohotspot" xmlns:android="http://schemas.android.com/apk/res/android">
          <uses-permission android:name="android.permission.ACCESS_WIFI_STATE"/>
          <uses-permission android:name="android.permission.CHANGE_WIFI_STATE"/>
          <uses-permission android:name="android.permission.WRITE_SETTINGS"/>
          <uses-permission android:name="android.permission.RECEIVE_BOOT_COMPLETED"/>
          <application android:label="AutoHotspot"><activity android:name=".MainActivity" android:exported="true"><intent-filter><action android:name="android.intent.action.MAIN"/><category android:name="android.intent.category.LAUNCHER"/></intent-filter></activity><receiver android:name=".BootReceiver" android:exported="true"><intent-filter><action android:name="android.intent.action.BOOT_COMPLETED"/></intent-filter></receiver></application></manifest>
          EOF
          cat > app/src/main/java/com/autohotspot/MainActivity.java << 'EOF'
          package com.autohotspot; import android.app.Activity; import android.os.Bundle; import android.provider.Settings; import android.widget.Toast;
          public class MainActivity extends Activity { @Override protected void onCreate(Bundle savedInstanceState) { super.onCreate(savedInstanceState); if (!Settings.System.canWrite(this)) Toast.makeText(this,"Izin WRITE_SETTINGS diperlukan",Toast.LENGTH_LONG).show(); else Toast.makeText(this,"Auto Hotspot aktif",Toast.LENGTH_SHORT).show(); finish(); } }
          EOF
          cat > app/src/main/java/com/autohotspot/BootReceiver.java << 'EOF'
          package com.autohotspot; import android.content.BroadcastReceiver; import android.content.Context; import android.content.Intent;
          public class BootReceiver extends BroadcastReceiver { @Override public void onReceive(Context context, Intent intent) { if (Intent.ACTION_BOOT_COMPLETED.equals(intent.getAction())) HotspotHelper.turnOnHotspot(context); } }
          EOF
          cat > app/src/main/java/com/autohotspot/HotspotHelper.java << 'EOF'
          package com.autohotspot; import android.content.Context; import android.net.wifi.WifiConfiguration; import android.net.wifi.WifiManager; import java.lang.reflect.Method;
          public class HotspotHelper { public static void turnOnHotspot(Context c) { try { WifiManager wm = (WifiManager) c.getSystemService(Context.WIFI_SERVICE); if(wm.isWifiEnabled()) wm.setWifiEnabled(false); Thread.sleep(1000); WifiConfiguration config = new WifiConfiguration(); config.SSID = "J2 Prime"; config.allowedKeyManagement.set(WifiConfiguration.KeyMgmt.NONE); Method m = wm.getClass().getMethod("setWifiApEnabled", WifiConfiguration.class, boolean.class); m.invoke(wm, config, true); } catch(Exception e){ e.printStackTrace(); } } }
          EOF
          echo '<?xml version="1.0" encoding="utf-8"?><resources><string name="app_name">Auto Hotspot</string></resources>' > app/src/main/res/values/strings.xml
          echo '<?xml version="1.0" encoding="utf-8"?><resources><color name="black">#000000</color></resources>' > app/src/main/res/values/colors.xml
          ./gradlew assembleRelease
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/outputs/apk/release/*.apk
